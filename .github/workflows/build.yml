name: build
on:
  push:
    branches:
      - prod

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      packages: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate modules manifest
        run: deno task manifest

      - name: Run Build
        run: deno task build

      - name: Generate SEO assets
        run: |
          deno run -A modules/index/seo.ts "${{ vars.SITE_BASE_URL || 'https://fastro.dev' }}"

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: fastro
          entrypoint: main.ts
          import-map: deno.json
