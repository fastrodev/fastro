<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        :root {
            --page-bg: #ffffff;
            --page-fg: #0f172a;
            --page-muted: #6b7280;
            --page-accent: #3b82f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: #020617;
                --page-fg: #f1f5f9;
                --page-muted: #94a3b8;
                --page-accent: #60a5fa;
            }
        }
    </style>
</head>
<body style="background-color:var(--page-bg); color:var(--page-fg);">
    <div class="flex items-center justify-center min-h-screen">
        <h1 class="text-6xl font-black">404</h1>
        <p class="ml-4">Page not found.</p>
    </div>
</body>
</html>
